/**
 * 1. 基础状态管理
 * 统一处理主题存储，兼容 Butterfly 原生逻辑
 */
var ThemeManager = {
    save: function(v) {
        // 使用 Butterfly 的 JSON 格式，确保 btf.saveToLocal.get() 能正确解析
        var obj = { value: v, expiry: Date.now() + 2 * 86400000 };
        localStorage.setItem('theme', JSON.stringify(obj));
    },
    get: function() {
        var raw = localStorage.getItem('theme');
        if (!raw) return null;
        try {
            var obj = JSON.parse(raw);
            return (Date.now() < obj.expiry) ? obj.value : null;
        } catch (e) { return raw; }
    },
    applyAttribute: function(theme) {
        document.documentElement.setAttribute('data-theme', theme);
    }
};

/**
 * 2. Giscus 同步逻辑
 */
function updateGiscusTheme() {
    var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    // 优先调 Butterfly 官方注册的 Giscus 切换函数
    if (window.btf && btf.globalFn && btf.globalFn.themeChange && btf.globalFn.themeChange.giscus) {
        btf.globalFn.themeChange.giscus(theme);
    } else {
        // fallback：直接 postMessage
        var iframe = document.querySelector('iframe.giscus-frame');
        if (iframe && iframe.contentWindow) {
            iframe.contentWindow.postMessage({
                giscus: { setConfig: { theme: theme } }
            }, 'https://giscus.app');
        }
    }
}

/**
 * 3. 核心切换与恢复
 */
function initDarkScript() {
    var savedTheme = ThemeManager.get();
    if (!savedTheme) return;

    // 立即设属性防止白屏闪烁
    ThemeManager.applyAttribute(savedTheme);

    // 轮询直到 Butterfly 核心API就绪，最多等 2s
    var retry = 0;
    var timer = setInterval(function() {
        if (window.btf && typeof btf.activateDarkMode === 'function') {
            if (savedTheme === 'dark') btf.activateDarkMode();
            else btf.activateLightMode();
            clearInterval(timer);
        }
        if (retry++ > 20) clearInterval(timer);
    }, 100);
}

function toggleDark() {
    // 点击 Butterfly 原生按钮，触发 changeTheme() → 保存JSON格式 + 触发 themeChange 全局函数
    var btn = document.getElementById('darkmode');
    if (btn) {
        btn.click();
    } else {
        // fallback（不应触发，但保留）
        var current = document.documentElement.getAttribute('data-theme');
        var next = current === 'dark' ? 'light' : 'dark';
        ThemeManager.applyAttribute(next);
        ThemeManager.save(next);
        if (window.btf) {
            next === 'dark' ? btf.activateDarkMode() : btf.activateLightMode();
        }
    }
    // 不需要手动调 updateGiscusTheme，Butterfly 的 themeChange 全局函数已处理
}

/**
 * 4. 雪花持久化逻辑
 */
function checkAndRunSnow() {
    if (typeof window.initSnow === 'function') {
        window.initSnow();
    }
}

/**
 * 5. UI 维护（移除 href 等）
 */
function fixUI() {
    document.querySelectorAll('.menus_item a, .site-page').forEach(function(el) {
        var icon = el.querySelector('i');
        if (icon && (icon.classList.contains('fa-snowflake') || icon.classList.contains('fa-moon'))) {
            el.removeAttribute('href');
            el.style.cursor = 'pointer';
        }
    });
}

/**
 * 6. 事件统一调度
 */

// A. 页面初始化
document.addEventListener('DOMContentLoaded', function() {
    initDarkScript();
    fixUI();
    checkAndRunSnow();
    // 初始加载时 Giscus 可能用错误主题初始化，等 iframe 出来再修正
    var gTimer = setInterval(function() {
        if (document.querySelector('iframe.giscus-frame')) {
            setTimeout(updateGiscusTheme, 200);
            clearInterval(gTimer);
        }
    }, 500);
    setTimeout(function() { clearInterval(gTimer); }, 10000);
});

// B. 点击监听
document.addEventListener('click', function(e) {
    var target = e.target.closest('.menus_item, .site-page');
    if (!target) return;
    var icon = target.querySelector('i');
    if (!icon) return;

    if (icon.classList.contains('fa-snowflake')) {
        if (window.toggleSnow) window.toggleSnow();
        e.preventDefault();
    } else if (icon.classList.contains('fa-moon')) {
        toggleDark();
        e.preventDefault();
    }
});

// C. PJAX 换页处理
document.addEventListener('pjax:complete', function() {
    // 立刻恢复主题属性，不等 btf
    var saved = ThemeManager.get();
    if (saved) ThemeManager.applyAttribute(saved);

    initDarkScript();
    fixUI();
    checkAndRunSnow();

    // 轮询 Giscus，等 iframe 出来后 200ms 再同步
    var gTimer = setInterval(function() {
        if (document.querySelector('iframe.giscus-frame')) {
            setTimeout(updateGiscusTheme, 200);
            clearInterval(gTimer);
        }
    }, 500);
    setTimeout(function() { clearInterval(gTimer); }, 10000);
});
</script>
