    (() => {
      
    const saveToLocal = {
      set: (key, value, ttl) => {
        if (!ttl) return
        const expiry = Date.now() + ttl * 86400000
        localStorage.setItem(key, JSON.stringify({ value, expiry }))
      },
      get: key => {
        const itemStr = localStorage.getItem(key)
        if (!itemStr) return undefined
        const { value, expiry } = JSON.parse(itemStr)
        if (Date.now() > expiry) {
          localStorage.removeItem(key)
          return undefined
        }
        return value
      }
    }

    window.btf = {
      saveToLocal,
      getScript: (url, attr = {}) => new Promise((resolve, reject) => {
        const script = document.createElement('script')
        script.src = url
        script.async = true
        Object.entries(attr).forEach(([key, val]) => script.setAttribute(key, val))
        script.onload = script.onreadystatechange = () => {
          if (!script.readyState || /loaded|complete/.test(script.readyState)) resolve()
        }
        script.onerror = reject
        document.head.appendChild(script)
      }),
      getCSS: (url, id) => new Promise((resolve, reject) => {
        const link = document.createElement('link')
        link.rel = 'stylesheet'
        link.href = url
        if (id) link.id = id
        link.onload = link.onreadystatechange = () => {
          if (!link.readyState || /loaded|complete/.test(link.readyState)) resolve()
        }
        link.onerror = reject
        document.head.appendChild(link)
      }),
      addGlobalFn: (key, fn, name = false, parent = window) => {

      }

// 1. 开关灯核心逻辑
function toggleDark() {
  const btn = document.querySelector('.darkmode-switch');
  if (btn) {
    btn.click();
  } else {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const newTheme = isDark ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', newTheme);
    saveToLocal.set('theme', newTheme, 2);
  }
}

// 2. 移除 href 属性的函数（解决左下角提示）
function removeMenuHref() {
  document.querySelectorAll('.menus_item a').forEach(function(el) {
    const icon = el.querySelector('i');
    if (icon && (icon.classList.contains('fa-snowflake') || icon.classList.contains('fa-moon'))) {
      el.removeAttribute('href');
      el.style.cursor = 'pointer';
    }
  });
}

// 3. 全局点击监听
document.addEventListener('click', function (e) {
  const target = e.target.closest('.menus_item, .site-page');
  if (!target) return;

  const icon = target.querySelector('i');
  if (!icon) return;

  if (icon.classList.contains('fa-snowflake')) {
    if (typeof toggleSnow === 'function') toggleSnow();
    e.preventDefault();
  }
  else if (icon.classList.contains('fa-moon')) {
    toggleDark();
    e.preventDefault();
  }
});
